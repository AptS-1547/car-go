name: Bug Report
description: Report a reproducible problem in car-go
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Remove secrets, tokens, private module URLs, and proprietary source from logs and snippets.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the user-visible problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - car-go version:
        - Go version:
        - Rust version (if built from source):
        - OS:
        - Shell:
  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: Include the exact command and sanitized output. Include direct tool output when useful.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I removed secrets and private data
          required: true
